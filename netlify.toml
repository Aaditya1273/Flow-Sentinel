[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NEXT_USE_NETLIFY_EDGE = "true"

# ── Environment Variables (set these in Netlify dashboard) ──
# These are the defaults for testnet. Override in Netlify UI for mainnet.
# [context.production.environment]
#   NEXT_PUBLIC_FLOW_ACCESS_NODE = "https://rest-mainnet.onflow.org"
#   NEXT_PUBLIC_SENTINEL_VAULT_ADDRESS = "0x..."
#   NEXT_PUBLIC_SENTINEL_INTERFACES_ADDRESS = "0x..."
#   NEXT_PUBLIC_STRATEGY_REGISTRY_ADDRESS = "0x..."
#   NEXT_PUBLIC_FLOW_TOKEN_ADDRESS = "0x1654653399040a61"
#   NEXT_PUBLIC_FUNGIBLE_TOKEN_ADDRESS = "0xf233dcee88fe0abe"
