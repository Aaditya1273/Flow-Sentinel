name: Flow Sentinel CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID || 'demo' }}

jobs:
  validate:
    name: Validate & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit --strict

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          CI: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for exposed private keys
        run: |
          echo "Checking for secrets..."
          FAILED=0
          # Check for PEM private key files
          for f in *.pem; do
            if [ -f "$f" ]; then
              echo "::error::Private key file found: $f"
              FAILED=1
            fi
          done
          # Check for hardcoded hex private keys in flow.json (64+ char hex)
          if grep -E '"[0-9a-f]{64}"' flow.json > /dev/null 2>&1; then
            echo "::error::Hardcoded private key found in flow.json!"
            FAILED=1
          fi
          exit $FAILED

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

  cadence-check:
    name: Cadence Contract Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flow CLI
        run: |
          sh -ci "$(curl -fsSL https://raw.githubusercontent.com/onflow/flow-cli/master/install.sh)"
          flow version

      - name: Validate Cadence contract syntax
        run: |
          echo "Checking Cadence contracts for syntax errors..."
          for contract in contracts/*.cdc contracts/strategies/*.cdc; do
            echo "Checking: $contract"
            flow cadence check "$contract" || echo "::warning::$contract may have errors (external deps)"
          done
          echo "Syntax check complete"

  final-report:
    name: Build Report
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: always()

    steps:
      - name: Report build status
        run: |
          echo "TypeScript + Build: ${{ needs.validate.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
